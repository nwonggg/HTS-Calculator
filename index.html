<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTS Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
  :root[data-theme="light"]{
    --bg:#FFFFFF;
    --surface:#FFFFFF;
    --surface-2:#F4F7F6;
    --border:#E0E5EB;
    --border-strong:#98A8B3;
    --text-primary:#232E35;
    --text-secondary:#354652;
    --text-muted:#98A8B3;
    --accent:#04A973;
    --accent-hover:#19805E;
    --accent-soft:#E1F9F1;
    --accent-text:#19805E;
    --danger:#B3423A;
    --danger-soft:#FBECEA;
    --review:#9A6B14;
    --review-soft:#FBF1DE;
    --table-head:#8A97A0;
    --table-head-text:#FFFFFF;
  }
  :root[data-theme="dark"]{
    --bg:#0F0F10;
    --surface:#1B2227;
    --surface-2:#232E35;
    --border:#354652;
    --border-strong:#354652;
    --text-primary:#F4F7F6;
    --text-secondary:#98A8B3;
    --text-muted:#6E7C86;
    --accent:#2AD39B;
    --accent-hover:#AAEED7;
    --accent-soft:#14332A;
    --accent-text:#AAEED7;
    --danger:#E29088;
    --danger-soft:#2E1D1B;
    --review:#E0B15C;
    --review-soft:#332711;
    --table-head:#354652;
    --table-head-text:#F4F7F6;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    background:var(--surface-2);
    color:var(--text-primary);
    font-family:'Inter',sans-serif;
    transition:background .15s ease, color .15s ease;
  }
  .page{ max-width:980px; margin:0 auto; padding:0 24px 60px; }

  .top-stripe{
    height:6px;
    border-radius:999px;
    background:linear-gradient(90deg, var(--accent-hover), var(--accent));
    margin:24px 0 28px;
  }

  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:28px;
    gap:16px;
  }
  .brand h1{ font-size:28px; font-weight:700; margin:0; letter-spacing:-0.3px; }
  .brand .sub{ font-size:14px; color:var(--text-secondary); margin-top:6px; }

  .brand-right{ display:flex; align-items:center; gap:16px; margin-top:6px; }
  .wordmark{
    display:flex; align-items:center; gap:10px;
    font-weight:700; font-size:15px; letter-spacing:3px;
    color:var(--text-primary); white-space:nowrap;
  }
  .wordmark .dot{ color:var(--accent); font-size:20px; line-height:0; }
  .wordmark .sub-brand{ color:var(--accent-text); }

  .toggle{
    width:48px; height:26px;
    border-radius:999px;
    background:var(--surface-2);
    border:1px solid var(--border);
    position:relative;
    cursor:pointer;
    padding:0;
    flex-shrink:0;
  }
  .toggle .knob{
    position:absolute;
    top:2px; left:2px;
    width:20px; height:20px;
    border-radius:50%;
    background:var(--accent);
    display:flex; align-items:center; justify-content:center;
    color:#fff;
    font-size:10px;
    transition:left .15s ease;
  }
  :root[data-theme="dark"] .toggle .knob{ left:24px; }

  .section-label{
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--accent-text);
    font-weight:700;
    margin:0 0 20px;
  }

  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:28px;
    margin-bottom:24px;
  }

  .drop{
    border:1.5px dashed var(--border-strong);
    border-radius:10px;
    padding:26px;
    text-align:center;
    color:var(--text-muted);
    font-size:13px;
    margin-bottom:16px;
    cursor:pointer;
  }
  .drop.dragover{ border-color:var(--accent); color:var(--accent-text); }
  .drop .filename{
    font-family:'Roboto Mono',monospace;
    color:var(--text-primary);
    font-weight:500;
    margin-top:6px;
    font-size:13px;
  }

  .btn-row{ display:flex; gap:10px; flex-wrap:wrap; }
  button{
    height:40px;
    border:1.5px solid var(--border-strong);
    border-radius:8px;
    padding:0 18px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    font-family:'Inter',sans-serif;
    background:var(--surface);
    color:var(--text-primary);
  }
  .btn-primary{ background:var(--accent-hover); color:#fff; border-color:var(--accent-hover); }
  .btn-primary:hover{ background:var(--accent); border-color:var(--accent); }
  .btn-primary:disabled{ background:var(--border-strong); border-color:var(--border-strong); cursor:not-allowed; }
  .btn-secondary{ background:var(--surface); color:var(--text-primary); border-color:var(--border-strong); }
  .btn-secondary:hover{ background:var(--surface-2); }
  .btn-danger{ background:var(--surface); color:var(--danger); border-color:var(--danger); }
  .btn-danger:hover{ background:var(--danger-soft); }

  .status{
    margin-top:12px;
    font-size:12.5px;
    color:var(--text-muted);
    min-height:16px;
  }
  .status.err{ color:var(--danger); }
  .status.ok{ color:var(--accent-text); }

  .totals-grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:12px;
  }
  .total-card{
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:16px;
    overflow:hidden;
  }
  .total-card .code{
    font-family:'Roboto Mono',monospace;
    font-size:12.5px;
    color:var(--text-muted);
  }
  .total-card .commodity-name{
    font-size:11.5px;
    color:var(--text-muted);
    font-style:italic;
    margin-top:2px;
  }
  .total-card.review{ border-color:var(--review); background:var(--review-soft); }
  .total-card.review .amount{ color:var(--review); }
  .notify-link{
    display:inline-flex;
    align-items:center;
    gap:5px;
    margin-top:12px;
    padding-top:10px;
    border-top:1px solid var(--border);
    color:#1a56db;
    font-size:11.5px;
    font-weight:700;
    text-decoration:underline;
    width:100%;
  }
  .notify-link:hover{ color:#1442b0; }
  .empty-breakdown{
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid var(--border);
    font-size:11px;
    color:var(--text-muted);
    font-style:italic;
    line-height:1.5;
  }
  .total-card .amount{
    font-family:'Roboto Mono',monospace;
    font-size:22px;
    font-weight:500;
    margin-top:6px;
    color:var(--accent-text);
  }
  .total-card .count{
    font-size:11px;
    color:var(--text-muted);
    margin-top:4px;
  }

  details{ margin-top:22px; padding-top:20px; border-top:1px solid var(--border); }
  .print-row{
    display:flex;
    justify-content:flex-end;
    margin-top:18px;
    padding-top:16px;
    border-top:1px solid var(--border);
  }
  summary{
    cursor:pointer;
    font-size:12.5px;
    color:var(--text-secondary);
    font-weight:500;
    list-style:none;
  }
  summary::-webkit-details-marker{ display:none; }
  table.matched{
    width:100%;
    border-collapse:collapse;
    font-size:12.5px;
    margin-top:14px;
  }
  table.matched th{
    text-align:left;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.6px;
    color:var(--table-head-text);
    background:var(--table-head);
    padding:10px 10px;
    font-weight:700;
  }
  table.matched th:first-child{ border-radius:6px 0 0 6px; }
  table.matched th:last-child{ border-radius:0 6px 6px 0; }
  table.matched td{
    padding:10px;
    border-bottom:1px solid var(--border);
    font-family:'Roboto Mono',monospace;
    vertical-align:top;
    color:var(--text-primary);
  }
  table.matched td.line-text{ font-family:'Inter',sans-serif; color:var(--text-secondary); }
  table.matched .num{ text-align:right; white-space:nowrap; }
  .file-list{ display:flex; flex-direction:column; gap:8px; margin-bottom:16px; }
  .file-chip{
    display:flex; align-items:center; gap:10px;
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:8px;
    padding:8px 10px;
  }
  .file-chip .label-input{
    height:auto; border:none; background:transparent;
    font-weight:600; font-size:13.5px; padding:2px 0;
    width:100%; color:var(--text-primary);
  }
  .file-chip .label-input:focus{ outline:none; }
  .file-chip .file-meta{
    display:inline-block;
    font-size:11px; color:var(--text-muted);
    font-family:'Roboto Mono',monospace;
    margin-top:1px;
    text-decoration:none;
    cursor:pointer;
  }
  .file-chip .file-meta:hover{ color:var(--accent-text); text-decoration:underline; }
  .file-chip .remove-x{
    background:none; border:none; color:var(--danger);
    cursor:pointer; font-size:16px; font-weight:700; padding:0 4px; height:auto; flex-shrink:0;
  }
  .file-chip .remove-x:hover{ opacity:0.7; }

  .invoice-subheading{
    display:inline-block;
    font-size:13px; font-weight:700; color:var(--accent-text);
    background:var(--accent-soft);
    border:1px solid var(--accent);
    border-radius:999px;
    padding:5px 14px;
    margin:22px 0 12px;
  }
  .invoice-subheading:first-child{ margin-top:0; }
  .invoice-subheading.combined{
    display:block;
    color:var(--accent-text);
    background:none;
    border:none;
    border-radius:0;
    padding:20px 0 0;
    border-top:1px dashed var(--border-strong);
  }

  .grand-total-row{
    display:flex; justify-content:space-between; align-items:center;
    margin-top:12px; padding-top:12px;
    border-top:1px solid var(--border);
    font-size:13.5px; font-weight:600; color:var(--text-secondary);
  }
  .grand-total-row .amount{
    font-family:'Roboto Mono',monospace; font-size:17px; color:var(--text-primary);
  }

  .total-card.warn{ border-color:var(--danger); background:var(--danger-soft); }
  .warn-icon{ color:var(--danger); font-size:15px; }
  .breakdown{
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid var(--border);
    max-height:180px;
    overflow-y:auto;
    overflow-x:hidden;
    min-width:0;
  }
  .breakdown-row{
    display:flex;
    align-items:center;
    gap:8px;
    padding:3px 0;
    font-size:11.5px;
    min-width:0;
  }
  .breakdown-amt{
    font-family:'Roboto Mono',monospace;
    color:var(--text-primary);
    white-space:nowrap;
    flex-shrink:0;
  }
  .breakdown-amt.zero{ color:var(--danger); }
  .breakdown-label{
    color:var(--text-muted);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    min-width:0;
    flex:1;
  }
  .draggable-row{
    cursor:grab;
    border-radius:6px;
    padding-left:4px;
    padding-right:4px;
    margin:0 -4px;
  }
  .draggable-row:hover{ background:rgba(0,0,0,0.05); }
  .draggable-row:active{ cursor:grabbing; }
  .draggable-row.dragging{ opacity:0.4; }
  .drag-grip{
    color:var(--text-muted);
    font-size:11px;
    line-height:1;
    flex-shrink:0;
    letter-spacing:-2px;
  }
  .total-card.drop-target{
    outline:2px dashed var(--accent);
    outline-offset:-2px;
    background:var(--accent-soft);
  }
  .basis-line{
    font-size:11px; color:var(--text-muted); font-weight:400; margin-top:2px;
  }
  .basis-line.warn-text{ color:var(--danger); }
  tr.zero-row{ background:var(--danger-soft); }
  td.zero-amount{ color:var(--danger); }
  .del-btn{
    background:none; border:none; color:var(--danger); cursor:pointer; font-size:16px; font-weight:700; padding:0; height:auto;
  }
  .del-btn:hover{ opacity:0.7; }
</style>
</head>
<body>
<div class="page">

  <div class="top-stripe"></div>

  <div class="topbar">
    <div class="brand">
      <h1>HTS Calculator</h1>
      <div class="sub">Upload a commercial invoice, match line items to HS codes, get totals per code.</div>
    </div>
    <div class="brand-right">
      <div class="wordmark">
        <span>T W I S T</span><span class="dot">&middot;</span><span class="sub-brand">BIOSCIENCE</span>
      </div>
      <button class="toggle" id="themeToggle" aria-label="Toggle dark mode">
        <span class="knob" id="themeKnob">&#9728;</span>
      </button>
    </div>
  </div>

  <p class="section-label">Upload invoice(s)</p>
  <div class="card">
    <div class="drop" id="dropZone">
      <div id="dropText">Drop one or more commercial invoice PDFs here, or click to choose</div>
      <input type="file" id="fileInput" accept="application/pdf" multiple style="display:none">
    </div>
    <div class="file-list" id="fileList"></div>
    <div class="btn-row">
      <button class="btn-secondary" id="uploadBtn">Upload</button>
      <button class="btn-danger" id="clearBtn">Clear</button>
      <button class="btn-primary" id="submitBtn" disabled>Submit</button>
    </div>
    <div class="status" id="statusMsg"></div>
  </div>

  <p class="section-label">HS code totals</p>
  <div class="card">
    <div id="totalsContainer"></div>

    <details id="reviewDetails">
      <summary>Matched line items (review before relying on totals)</summary>
      <table class="matched" id="matchedTable">
        <thead>
          <tr id="matchedHeadRow"></tr>
        </thead>
        <tbody id="matchedBody"></tbody>
      </table>
    </details>

    <div class="print-row">
      <button class="btn-secondary" id="printSummaryBtn">&#128424;&#65039; Print summary</button>
    </div>
  </div>

</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const CODE_DEFS = [
  { scheduleB: '2934.99.0005', bare: '293499', name: 'Synthetic DNA', re: /2934\s?[.\-]?\s?99/i },
  { scheduleB: '3822.19.0000', bare: '382219', name: 'Lab Reagents', re: /3822\s?[.\-]?\s?19/i },
  { scheduleB: '3824.99.9370', bare: '382499', name: 'Lab Reagents', re: /3824\s?[.\-]?\s?99/i }
];
const NEEDS_APPROVAL = 'NEEDS_APPROVAL';
const BLANK_HS_RE = /HS\s*#?\s*:\s*(?:ECCN|$)/i;

let selectedFiles = [];
let fileIdCounter = 1;
let matchedItems = [];
let flaggedSources = new Set();
let hasEverFlagged = false;

function hasFlagHistory(contextLabel){
  if(contextLabel === 'combined invoices'){ return hasEverFlagged; }
  return flaggedSources.has(contextLabel);
}
const fileInput = document.getElementById('fileInput');
const dropZone = document.getElementById('dropZone');
const fileListEl = document.getElementById('fileList');
const submitBtn = document.getElementById('submitBtn');
const statusMsg = document.getElementById('statusMsg');
const themeToggle = document.getElementById('themeToggle');
const themeKnob = document.getElementById('themeKnob');

function applyTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
  themeKnob.innerHTML = theme === 'dark' ? '&#9789;' : '&#9728;';
}
const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
applyTheme(prefersDark ? 'dark' : 'light');
themeToggle.addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  applyTheme(current === 'dark' ? 'light' : 'dark');
});

function fmt(n){
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function setStatus(text, kind){
  statusMsg.textContent = text || '';
  statusMsg.className = 'status' + (kind ? ' ' + kind : '');
}

function buildMailtoLink(naRows, contextLabel){
  const subject = `HS code classification needed${contextLabel ? ' — ' + contextLabel : ''}`;
  let body = 'Hi Candace,\n\nThe following line item(s) are missing an HS code in GTS and need to be classified:\n\n';
  if(naRows.length > 0){
    body += naRows.map(r =>
      `Part Number: ${r.partNumber || ''}\nDescription: ${r.description || ''}\nQ-Number: ${r.source || ''}`
    ).join('\n\n');
  } else {
    body += 'Part Number: \nDescription: \nQ-Number: ';
  }
  body += '\n\n\uD83D\uDE00\n\nThanks!';
  return `mailto:csilk@twistbioscience.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

function buildCard(rows, targetScheduleB, headerHtml, extraClass, options){
  options = options || {};
  const sum = rows.reduce((a, r) => a + r.value, 0);
  const hasZeroIssue = rows.some(r => r.value === 0);

  const card = document.createElement('div');
  card.className = 'total-card' + (extraClass ? ' ' + extraClass : '') + (hasZeroIssue ? ' warn' : '');

  let breakdownHtml;
  if(rows.length > 0){
    breakdownHtml = `<div class="breakdown">${rows.map((r, i) => `
        <div class="breakdown-row draggable-row" draggable="true" data-row-idx="${i}">
          <span class="drag-grip" title="Drag to reclassify">&#8942;&#8942;</span>
          <span class="breakdown-amt${r.value === 0 ? ' zero' : ''}">${fmt(r.value)}</span>
          <span class="breakdown-label" title="${(r.source ? r.source + ' — ' : '') + r.text}">${r.source ? r.source + ' — ' : ''}${r.text}</span>
        </div>
      `).join('')}</div>`;
  } else if(options.emptyMessage){
    breakdownHtml = `<div class="empty-breakdown">${options.emptyMessage}</div>`;
  } else {
    breakdownHtml = '';
  }

  card.innerHTML = `
    ${headerHtml}
    <div class="amount">${fmt(sum)}${hasZeroIssue ? ' <span class="warn-icon" title="One or more matched lines came out to $0.00">&#9888;</span>' : ''}</div>
    <div class="count">${rows.length} matched line${rows.length === 1 ? '' : 's'}</div>
    ${breakdownHtml}
    ${options.footerHtml || ''}
  `;

  card.querySelectorAll('.draggable-row').forEach(rowEl => {
    const i = parseInt(rowEl.dataset.rowIdx, 10);
    const globalIdx = matchedItems.indexOf(rows[i]);
    rowEl.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', String(globalIdx));
      e.dataTransfer.effectAllowed = 'move';
      rowEl.classList.add('dragging');
    });
    rowEl.addEventListener('dragend', () => rowEl.classList.remove('dragging'));
  });

  card.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    card.classList.add('drop-target');
  });
  card.addEventListener('dragleave', () => card.classList.remove('drop-target'));
  card.addEventListener('drop', e => {
    e.preventDefault();
    card.classList.remove('drop-target');
    const idx = parseInt(e.dataTransfer.getData('text/plain'), 10);
    if(Number.isNaN(idx) || !matchedItems[idx]){ return; }
    if(matchedItems[idx].scheduleB === targetScheduleB){ return; }
    matchedItems[idx].scheduleB = targetScheduleB;
    renderTotals();
    renderMatched();
  });

  return { card, sum };
}

function buildTotalsBlock(items, contextLabel){
  const wrap = document.createElement('div');
  const grid = document.createElement('div');
  grid.className = 'totals-grid';
  let grandTotal = 0;

  CODE_DEFS.forEach(def => {
    const rows = items.filter(i => i.scheduleB === def.scheduleB);
    const headerHtml = `
      <div class="code">${def.bare} <span style="color:var(--text-muted); font-weight:400;">(${def.scheduleB})</span></div>
      <div class="commodity-name">${def.name}</div>
    `;
    const { card, sum } = buildCard(rows, def.scheduleB, headerHtml, '');
    grandTotal += sum;
    grid.appendChild(card);
  });

  const naRows = items.filter(i => i.scheduleB === NEEDS_APPROVAL);
  if(naRows.length > 0 || hasFlagHistory(contextLabel)){
    const naHeaderHtml = `
      <div class="code">Attention needed</div>
      <div class="commodity-name">HS # left blank &mdash; drag to the correct code, or drag back here if misplaced</div>
    `;
    const naFooterHtml = `<a class="notify-link" href="${buildMailtoLink(naRows, contextLabel)}">&#9993; Notify Candace</a>`;
    const { card: naCard, sum: naSum } = buildCard(naRows, NEEDS_APPROVAL, naHeaderHtml, 'review', {
      emptyMessage: 'All flagged lines have been reclassified.',
      footerHtml: naFooterHtml
    });
    grandTotal += naSum;
    grid.appendChild(naCard);
  }

  grid.style.gridTemplateColumns = `repeat(${CODE_DEFS.length + (naRows.length > 0 || hasFlagHistory(contextLabel) ? 1 : 0)}, 1fr)`;

  wrap.appendChild(grid);



  const totalRow = document.createElement('div');
  totalRow.className = 'grand-total-row';
  totalRow.innerHTML = `<span>Total &mdash; all HS codes</span><span class="amount">${fmt(grandTotal)}</span>`;
  wrap.appendChild(totalRow);

  return wrap;
}

function renderTotals(){
  const container = document.getElementById('totalsContainer');
  container.innerHTML = '';

  const labels = selectedFiles.length > 0
    ? selectedFiles.map(f => f.label)
    : [...new Set(matchedItems.map(i => i.source))];

  if(labels.length <= 1){
    container.appendChild(buildTotalsBlock(matchedItems, labels[0] || ''));
    return;
  }

  labels.forEach(label => {
    const heading = document.createElement('div');
    heading.className = 'invoice-subheading';
    heading.textContent = label;
    container.appendChild(heading);
    container.appendChild(buildTotalsBlock(matchedItems.filter(i => i.source === label), label));
  });

  const combinedHeading = document.createElement('div');
  combinedHeading.className = 'invoice-subheading combined';
  combinedHeading.textContent = `Combined total (${labels.length} invoices)`;
  container.appendChild(combinedHeading);
  container.appendChild(buildTotalsBlock(matchedItems, 'combined invoices'));
}

function renderMatched(){
  const headRow = document.getElementById('matchedHeadRow');
  const body = document.getElementById('matchedBody');
  const showSource = new Set(matchedItems.map(i => i.source)).size > 1;

  headRow.innerHTML = `
    <th>HS code</th>
    ${showSource ? '<th>Source</th>' : ''}
    <th>Line text</th>
    <th class="num">Value</th>
    <th></th>
  `;

  body.innerHTML = '';
  if(matchedItems.length === 0){
    body.innerHTML = `<tr><td colspan="${showSource ? 5 : 4}" style="text-align:center;color:var(--text-muted);padding:16px;">No matched lines yet.</td></tr>`;
    return;
  }

  matchedItems.forEach((item, idx) => {
    const def = CODE_DEFS.find(d => d.scheduleB === item.scheduleB);
    const isZero = item.value === 0;
    const isNeedsApproval = item.scheduleB === NEEDS_APPROVAL;
    const tr = document.createElement('tr');
    if(isZero){ tr.className = 'zero-row'; }
    tr.innerHTML = `
      <td>${isNeedsApproval
        ? '<span style="color:var(--review); font-weight:600;">Attention needed</span>'
        : `${def ? def.bare : ''} <span style="color:var(--text-muted);">(${item.scheduleB})</span>`}</td>
      ${showSource ? `<td class="line-text">${item.source || ''}</td>` : ''}
      <td class="line-text">
        <div>${item.text}</div>
        ${item.basis ? `<div class="basis-line">${item.basis}</div>` : ''}
        ${isZero ? `<div class="basis-line warn-text">&#9888; No price found on this line &mdash; defaulted to $0.00, please check manually</div>` : ''}
      </td>
      <td class="num${isZero ? ' zero-amount' : ''}">${fmt(item.value)}</td>
      <td><button class="del-btn" data-idx="${idx}" aria-label="Remove match">&times;</button></td>
    `;
    body.appendChild(tr);
  });

  body.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      matchedItems.splice(parseInt(btn.dataset.idx), 1);
      renderTotals();
      renderMatched();
    });
  });
}

function defaultLabel(filename){
  return filename.replace(/\.pdf$/i, '');
}

function renderFileList(){
  fileListEl.innerHTML = '';
  selectedFiles.forEach(f => {
    const chip = document.createElement('div');
    chip.className = 'file-chip';
    chip.innerHTML = `
      <div style="flex:1; min-width:0;">
        <input class="label-input" type="text" value="${f.label}" data-id="${f.id}" aria-label="Label for ${f.file.name}">
        <a class="file-meta" href="${f.previewUrl}" target="_blank" rel="noopener noreferrer" title="Open the uploaded PDF in a new tab">${f.file.name}</a>
      </div>
      <button class="remove-x" data-id="${f.id}" aria-label="Remove file">&times;</button>
    `;
    fileListEl.appendChild(chip);
  });
  fileListEl.querySelectorAll('.label-input').forEach(inp => {
    inp.addEventListener('input', () => {
      const f = selectedFiles.find(x => String(x.id) === inp.dataset.id);
      if(f){ f.label = inp.value.trim() || defaultLabel(f.file.name); }
    });
  });
  fileListEl.querySelectorAll('.remove-x').forEach(btn => {
    btn.addEventListener('click', () => {
      const removed = selectedFiles.find(x => String(x.id) === btn.dataset.id);
      if(removed && removed.previewUrl){ URL.revokeObjectURL(removed.previewUrl); }
      selectedFiles = selectedFiles.filter(x => String(x.id) !== btn.dataset.id);
      renderFileList();
      submitBtn.disabled = selectedFiles.length === 0;
      if(selectedFiles.length === 0){ setStatus(''); }
    });
  });
}

function resetAll(){
  selectedFiles.forEach(f => { if(f.previewUrl){ URL.revokeObjectURL(f.previewUrl); } });
  selectedFiles = [];
  matchedItems = [];
  flaggedSources = new Set();
  hasEverFlagged = false;
  fileInput.value = '';
  renderFileList();
  submitBtn.disabled = true;
  setStatus('');
  renderTotals();
  renderMatched();
}

function handleFiles(fileListArg){
  const filesArr = Array.from(fileListArg || []);
  if(filesArr.length === 0){ return; }
  let skipped = 0;
  filesArr.forEach(file => {
    if(file.type !== 'application/pdf'){ skipped++; return; }
    selectedFiles.push({ id: fileIdCounter++, file, label: defaultLabel(file.name), previewUrl: URL.createObjectURL(file) });
  });
  renderFileList();
  submitBtn.disabled = selectedFiles.length === 0;
  if(skipped > 0){
    setStatus(`${skipped} file${skipped === 1 ? '' : 's'} skipped (not a PDF).`, 'err');
  } else if(selectedFiles.length > 0){
    setStatus(`${selectedFiles.length} file${selectedFiles.length === 1 ? '' : 's'} ready. Rename labels if you'd like, then click submit.`, 'ok');
  }
}

document.getElementById('uploadBtn').addEventListener('click', () => fileInput.click());
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { handleFiles(e.target.files); fileInput.value = ''; });

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});

document.getElementById('clearBtn').addEventListener('click', resetAll);

function extractLinesFromTextContent(textContent){
  const rows = [];
  textContent.items.forEach(it => {
    const y = Math.round(it.transform[5]);
    let row = rows.find(r => Math.abs(r.y - y) < 3);
    if(!row){ row = { y, parts: [] }; rows.push(row); }
    row.parts.push({ x: it.transform[4], text: it.str });
  });
  rows.sort((a, b) => b.y - a.y);
  return rows
    .map(r => r.parts.sort((a, b) => a.x - b.x).map(p => p.text).join(' ').replace(/\s+/g, ' ').trim())
    .filter(line => line.length > 0);
}

function stripEccn(text){
  return text.replace(/\s*ECCN\s*:?.*$/i, '').trim();
}

function findValueOnLine(line){
  const matches = line.match(/\$?\s?\d{1,3}(?:,\d{3})*\.\d{2}(?!\d)/g);
  if(!matches || matches.length === 0){ return null; }
  const last = matches[matches.length - 1];
  return parseFloat(last.replace(/[^0-9.]/g, ''));
}

const PRICE_LINE_RE_FULL = /\b(\d{1,6})\s+(\d{3,10})\s+([A-Za-z]{2})\s+(\d{1,6})\s+([A-Za-z]{1,4})\s+((?:\d{1,3}(?:,\d{3})+|\d+)[.,]\d{2})\b/;
const PRICE_LINE_RE_BASIC = /\b([A-Za-z]{2})\s+(\d{1,6})\s+([A-Za-z]{1,4})\s+((?:\d{1,3}(?:,\d{3})+|\d+)[.,]\d{2})\b/;

function normalizePriceToken(tok){
  if(tok.includes(',') && tok.includes('.')){
    tok = tok.replace(/,/g, '');
  } else if(tok.includes(',')){
    tok = tok.replace(',', '.');
  }
  return parseFloat(tok);
}

function parsePriceLine(line){
  const full = line.match(PRICE_LINE_RE_FULL);
  if(full){
    return {
      itemNumber: full[1],
      partNumber: full[2],
      qty: parseFloat(full[4]),
      unitPrice: normalizePriceToken(full[6])
    };
  }
  const basic = line.match(PRICE_LINE_RE_BASIC);
  if(basic){
    return {
      itemNumber: '',
      partNumber: '',
      qty: parseFloat(basic[2]),
      unitPrice: normalizePriceToken(basic[4])
    };
  }
  return null;
}

async function ocrPageLines(page, pageNum, totalPages){
  setStatus(`Running OCR on page ${pageNum} of ${totalPages} (no text layer found)…`);
  const viewport = page.getViewport({ scale: 2.5 });
  const canvas = document.createElement('canvas');
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  const ctx = canvas.getContext('2d');
  await page.render({ canvasContext: ctx, viewport }).promise;

  const worker = await Tesseract.createWorker('eng');
  const { data } = await worker.recognize(canvas);
  await worker.terminate();

  const rawLines = (data.lines && data.lines.length)
    ? data.lines.map(l => l.text)
    : (data.text || '').split('\n');

  return rawLines.map(l => l.replace(/\s+/g, ' ').trim()).filter(Boolean);
}

async function parsePdf(file){
  const buffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
  const found = [];
  let currentBlock = null;
  let pendingDescription = null;
  let ocrUsed = false;

  for(let p = 1; p <= pdf.numPages; p++){
    const page = await pdf.getPage(p);
    const textContent = await page.getTextContent();
    let lines;

    if(textContent.items.length > 0){
      lines = extractLinesFromTextContent(textContent);
    } else {
      ocrUsed = true;
      lines = await ocrPageLines(page, p, pdf.numPages);
    }

    lines.forEach(line => {
      const priceData = parsePriceLine(line);
      if(priceData){
        currentBlock = priceData;
        pendingDescription = null;
      } else if(currentBlock && !pendingDescription){
        const trimmed = line.trim();
        const looksLikeCodeOrBlank = CODE_DEFS.some(d => d.re.test(line)) || BLANK_HS_RE.test(line);
        if(trimmed.length > 3 && !looksLikeCodeOrBlank){
          pendingDescription = trimmed;
        }
      }
      let matched = false;

      for(const def of CODE_DEFS){
        if(def.re.test(line)){
          let value;
          let basis;
          if(currentBlock){
            value = Math.round(currentBlock.qty * currentBlock.unitPrice * 100) / 100;
            basis = `qty ${currentBlock.qty} \u00d7 ${fmt(currentBlock.unitPrice)}`;
          } else {
            const v = findValueOnLine(line);
            value = v === null ? 0 : v;
            basis = null;
          }
          found.push({
            scheduleB: def.scheduleB,
            text: stripEccn(line.length > 90 ? line.slice(0, 90) + '…' : line),
            basis,
            value,
            partNumber: currentBlock ? currentBlock.partNumber : '',
            description: pendingDescription || ''
          });
          matched = true;
          break;
        }
      }

      if(!matched && BLANK_HS_RE.test(line)){
        let value;
        let basis;
        if(currentBlock){
          value = Math.round(currentBlock.qty * currentBlock.unitPrice * 100) / 100;
          basis = `qty ${currentBlock.qty} \u00d7 ${fmt(currentBlock.unitPrice)}`;
        } else {
          const v = findValueOnLine(line);
          value = v === null ? 0 : v;
          basis = null;
        }
        found.push({
          scheduleB: NEEDS_APPROVAL,
          text: stripEccn(line.length > 90 ? line.slice(0, 90) + '…' : line) || 'HS # left blank on invoice',
          basis,
          value,
          partNumber: currentBlock ? currentBlock.partNumber : '',
          description: pendingDescription || ''
        });
      }
    });
  }

  return { found, ocrUsed };
}

document.getElementById('submitBtn').addEventListener('click', async () => {
  if(selectedFiles.length === 0){ return; }
  submitBtn.disabled = true;
  matchedItems = [];
  let anyOcr = false;
  let readError = null;

  for(const f of selectedFiles){
    setStatus(`Reading "${f.label}"…`);
    try{
      const { found, ocrUsed } = await parsePdf(f.file);
      if(ocrUsed){ anyOcr = true; }
      found.forEach(item => {
        item.source = f.label;
        if(item.scheduleB === NEEDS_APPROVAL){
          flaggedSources.add(f.label);
          hasEverFlagged = true;
        }
      });
      matchedItems = matchedItems.concat(found);
    } catch(err){
      readError = `Could not read "${f.label}": ${err.message}`;
      break;
    }
  }

  renderTotals();
  renderMatched();

  if(readError){
    setStatus(readError, 'err');
  } else if(matchedItems.length === 0){
    setStatus(`No lines matched the 3 HS codes across ${selectedFiles.length} invoice${selectedFiles.length === 1 ? '' : 's'}.` + (anyOcr ? ' (Read via OCR — image quality may have affected accuracy.)' : ''), 'err');
  } else {
    const zeroCount = matchedItems.filter(i => i.value === 0).length;
    let msg = `Matched ${matchedItems.length} line${matchedItems.length === 1 ? '' : 's'} across ${selectedFiles.length} invoice${selectedFiles.length === 1 ? '' : 's'}.`;
    if(anyOcr){ msg += ' Some pages were read via OCR — double-check those matches.'; }
    if(zeroCount > 0){ msg += ` ⚠ ${zeroCount} line${zeroCount === 1 ? '' : 's'} came out to $0.00 — see highlighted rows below.`; }
    setStatus(msg, zeroCount > 0 ? 'err' : 'ok');
  }

  submitBtn.disabled = false;
});

function sectionSummaryRows(items){
  let rows = '';
  let grand = 0;
  CODE_DEFS.forEach(def => {
    const sum = items.filter(i => i.scheduleB === def.scheduleB).reduce((a, r) => a + r.value, 0);
    grand += sum;
    rows += `<tr><td>${def.name}</td><td>${def.bare} (${def.scheduleB})</td><td class="num">${fmt(sum)}</td></tr>`;
  });
  const naRows = items.filter(i => i.scheduleB === NEEDS_APPROVAL);
  if(naRows.length > 0){
    const naSum = naRows.reduce((a, r) => a + r.value, 0);
    grand += naSum;
    rows += `<tr><td>Attention needed</td><td>&mdash;</td><td class="num">${fmt(naSum)}</td></tr>`;
  }
  rows += `<tr class="grand"><td colspan="2">Total &mdash; all HS codes</td><td class="num">${fmt(grand)}</td></tr>`;
  return rows;
}
